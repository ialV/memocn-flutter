workflows:
  android-release:
    name: Android APK Release
    max_build_duration: 60
    environment:
      flutter: stable
      java: 17
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Build APK
        script: |
          flutter build apk --release \
            --dart-define=APP_NAME=背文助手
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
    publishing:
      email:
        recipients:
          - dukiian@outlook.com
        notify:
          success: true
          failure: true
